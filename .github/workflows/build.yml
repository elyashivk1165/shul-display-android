name: Build Signed APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore if not present
        run: |
          if [ ! -f keystore.jks ]; then
            keytool -genkeypair \
              -alias shuldisplay \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore keystore.jks \
              -storepass shuldisplay123 \
              -keypass shuldisplay123 \
              -dname "CN=Shul Display, OU=App, O=ShulDisplay, L=IL, ST=IL, C=IL" \
              -noprompt
            git config user.email "elyashivk1165@gmail.com"
            git config user.name "Tohar"
            git add keystore.jks
            git commit -m "Add signing keystore [skip ci]"
            git push origin HEAD:main
            echo "Keystore generated and committed"
          else
            echo "Keystore already exists"
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Signed APK
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=../keystore.jks \
            -PKEYSTORE_PASS=shuldisplay123 \
            -PKEY_ALIAS=shuldisplay \
            -PKEY_PASS=shuldisplay123

      - name: Rename APK
        id: rename
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv app/build/outputs/apk/release/app-release.apk shul-display-$VERSION.apk
          echo "apk_name=shul-display-$VERSION.apk" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
