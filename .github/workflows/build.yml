name: Build Signed APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}   # e.g. "1.0.43"
          # versionCode = major*10000 + minor*100 + patch  →  1*10000 + 0*100 + 43 = 10043
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "version_name=$TAG" >> $GITHUB_OUTPUT
          echo "version_code=$CODE" >> $GITHUB_OUTPUT

      - name: Build Signed APK
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=../keystore.jks \
            -PKEYSTORE_PASS=shuldisplay123 \
            -PKEY_ALIAS=shuldisplay \
            -PKEY_PASS=shuldisplay123 \
            -PVERSION_NAME=${{ steps.version.outputs.version_name }} \
            -PVERSION_CODE=${{ steps.version.outputs.version_code }}

      - name: Rename APK
        id: rename
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv app/build/outputs/apk/release/app-release.apk shul-display-$VERSION.apk
          echo "apk_name=shul-display-$VERSION.apk" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
